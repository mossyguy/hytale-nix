name: Update Hytale Package

on:
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main  
      - run: nix profile add nixpkgs#{sd,jq,curl}

      - run: |
          set -euo pipefail
          nix flake update

          CURRENT_VERSION=$(nix eval --json .#packages.x86_64-linux.hytale-launcher.version | jq -r '.')
          MANIFEST=$(curl -sA "Mozilla/5.0" "https://launcher.hytale.com/version/release/launcher.json")
          
          LATEST_VERSION=$(echo "$MANIFEST" | jq -r '.version')
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            HEX_HASH=$(echo "$MANIFEST" | jq -r '.download_url.linux.amd64.sha256')
            LATEST_HASH=$(nix hash convert --hash-algo sha256 --to sri "$HEX_HASH")

            sd 'version\s*=\s*"[^"]*";' 'version = "'"$LATEST_VERSION"'";' flake.nix
            sd 'sha256\s*=\s*"[^"]*";' 'sha256 = "'"$LATEST_HASH"'";' flake.nix
          fi    
            
      - run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add flake.nix flake.lock
            git commit -m "chore: bump hytale launcher version"
            git push origin main
          fi
